<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 620" width="860" height="620" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="860" height="620" fill="#f8f9fa" rx="12"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="860" height="72" fill="#1e293b" rx="12"/>
  <rect x="0" y="55" width="860" height="17" fill="#1e293b"/>
  <text x="430" y="30" text-anchor="middle" fill="white" font-size="20" font-weight="bold">PROCESSMATE — Installation Locale</text>
  <text x="430" y="56" text-anchor="middle" fill="#94a3b8" font-size="13">Ce qu'il faut installer et configurer pour faire tourner l'application en local</text>

  <!-- WARNING banner -->
  <rect x="30" y="90" width="800" height="44" fill="#fef3c7" rx="8" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="50" y="107" fill="#92400e" font-size="13" font-weight="bold">Avertissement</text>
  <text x="50" y="124" fill="#78350f" font-size="12">Installation manuelle requise sur chaque poste · 4 services à démarrer simultanément · Clés API sensibles à gérer</text>

  <!-- === COLUMN 1 === -->
  <!-- Box: Prérequis Système -->
  <rect x="30" y="148" width="245" height="148" fill="white" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="30" y="148" width="245" height="36" fill="#3b82f6" rx="10"/>
  <rect x="30" y="168" width="245" height="16" fill="#3b82f6"/>
  <text x="152" y="171" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Systeme &amp; Prérequis</text>
  <text x="48" y="203" fill="#374151" font-size="12" font-weight="bold">Python</text>
  <text x="180" y="203" fill="#6b7280" font-size="12">3.10 ou supérieur</text>
  <text x="48" y="222" fill="#374151" font-size="12" font-weight="bold">Node.js</text>
  <text x="180" y="222" fill="#6b7280" font-size="12">18+ (LTS)</text>
  <text x="48" y="241" fill="#374151" font-size="12" font-weight="bold">RAM</text>
  <text x="180" y="241" fill="#6b7280" font-size="12">8 GB minimum</text>
  <text x="48" y="260" fill="#374151" font-size="12" font-weight="bold">Terminaux</text>
  <text x="180" y="260" fill="#ef4444" font-size="12" font-weight="bold">4 simultanés</text>
  <text x="48" y="279" fill="#374151" font-size="12" font-weight="bold">Connexion</text>
  <text x="180" y="279" fill="#6b7280" font-size="12">Internet requise</text>

  <!-- Box: Python packages -->
  <rect x="30" y="314" width="245" height="148" fill="white" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="30" y="314" width="245" height="36" fill="#8b5cf6" rx="10"/>
  <rect x="30" y="334" width="245" height="16" fill="#8b5cf6"/>
  <text x="152" y="337" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Backend Python (pip)</text>
  <text x="48" y="369" fill="#374151" font-size="12">FastAPI 0.115 + Uvicorn 0.30</text>
  <text x="48" y="388" fill="#374151" font-size="12">Pandas 2.2 + OpenPyXL 3.1</text>
  <text x="48" y="407" fill="#374151" font-size="12">Pillow 10.4 + Matplotlib 3.9</text>
  <text x="48" y="426" fill="#374151" font-size="12">Pydantic 2.9 + Supabase-py</text>
  <text x="48" y="445" fill="#374151" font-size="12">Google GenerativeAI + aiohttp</text>
  <text x="48" y="455" fill="#6b7280" font-size="10">→ pip install -r requirements.txt</text>

  <!-- === COLUMN 2 === -->
  <!-- Box: Frontend npm -->
  <rect x="307" y="148" width="245" height="148" fill="white" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="307" y="148" width="245" height="36" fill="#10b981" rx="10"/>
  <rect x="307" y="168" width="245" height="16" fill="#10b981"/>
  <text x="430" y="171" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Frontend Node.js (npm)</text>
  <text x="325" y="203" fill="#374151" font-size="12">Next.js 16 + React 19</text>
  <text x="325" y="222" fill="#374151" font-size="12">MUI 7 + Tailwind CSS 4</text>
  <text x="325" y="241" fill="#374151" font-size="12">bpmn-js 18 + ReactFlow 11</text>
  <text x="325" y="260" fill="#374151" font-size="12">Handsontable + XLSX + Mermaid</text>
  <text x="325" y="279" fill="#ef4444" font-size="12" font-weight="bold">454 packages au total</text>
  <text x="325" y="290" fill="#6b7280" font-size="10">→ npm install (frontend/)</text>

  <!-- Box: 4 Ports / Démarrage -->
  <rect x="307" y="314" width="245" height="148" fill="white" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="307" y="314" width="245" height="36" fill="#f59e0b" rx="10"/>
  <rect x="307" y="334" width="245" height="16" fill="#f59e0b"/>
  <text x="430" y="337" text-anchor="middle" fill="white" font-size="13" font-weight="bold">4 Services a Démarrer</text>
  <!-- port labels -->
  <rect x="325" y="357" width="52" height="18" fill="#fef3c7" rx="4"/>
  <text x="351" y="370" text-anchor="middle" fill="#92400e" font-size="11" font-weight="bold">:3000</text>
  <text x="387" y="370" fill="#374151" font-size="12">Frontend Next.js</text>
  <rect x="325" y="381" width="52" height="18" fill="#ede9fe" rx="4"/>
  <text x="351" y="394" text-anchor="middle" fill="#5b21b6" font-size="11" font-weight="bold">:8002</text>
  <text x="387" y="394" fill="#374151" font-size="12">Clinic API (BPMN)</text>
  <rect x="325" y="405" width="52" height="18" fill="#dcfce7" rx="4"/>
  <text x="351" y="418" text-anchor="middle" fill="#166534" font-size="11" font-weight="bold">:8001</text>
  <text x="387" y="418" fill="#374151" font-size="12">SCV Maker API</text>
  <rect x="325" y="429" width="52" height="18" fill="#fee2e2" rx="4"/>
  <text x="351" y="442" text-anchor="middle" fill="#991b1b" font-size="11" font-weight="bold">:8004</text>
  <text x="387" y="442" fill="#374151" font-size="12">SFD Generator API</text>
  <text x="325" y="457" fill="#6b7280" font-size="10">→ 4 terminaux ouverts en permanence</text>

  <!-- === COLUMN 3 === -->
  <!-- Box: Clés API -->
  <rect x="584" y="148" width="246" height="148" fill="white" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="584" y="148" width="246" height="36" fill="#ef4444" rx="10"/>
  <rect x="584" y="168" width="246" height="16" fill="#ef4444"/>
  <text x="707" y="171" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Clés API Requises</text>
  <text x="602" y="203" fill="#374151" font-size="12" font-weight="bold">Google Gemini</text>
  <text x="602" y="219" fill="#6b7280" font-size="11">GOOGLE_API_KEY (obligatoire)</text>
  <text x="602" y="238" fill="#374151" font-size="12" font-weight="bold">Supabase (Backend)</text>
  <text x="602" y="254" fill="#6b7280" font-size="11">SUPABASE_URL + SERVICE_KEY</text>
  <text x="602" y="273" fill="#374151" font-size="12" font-weight="bold">Supabase (Frontend)</text>
  <text x="602" y="289" fill="#6b7280" font-size="11">NEXT_PUBLIC_SUPABASE_URL + ANON_KEY</text>

  <!-- Box: Fichiers .env -->
  <rect x="584" y="314" width="246" height="148" fill="white" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="584" y="314" width="246" height="36" fill="#64748b" rx="10"/>
  <rect x="584" y="334" width="246" height="16" fill="#64748b"/>
  <text x="707" y="337" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Fichiers .env a Créer</text>
  <text x="602" y="367" fill="#374151" font-size="11" font-weight="bold">clinic/.env</text>
  <text x="602" y="383" fill="#6b7280" font-size="10">GOOGLE_API_KEY, SUPABASE_URL, SERVICE_KEY</text>
  <text x="602" y="403" fill="#374151" font-size="11" font-weight="bold">sfd/.env</text>
  <text x="602" y="419" fill="#6b7280" font-size="10">GOOGLE_API_KEY, PORT=8004</text>
  <text x="602" y="439" fill="#374151" font-size="11" font-weight="bold">frontend/.env.local</text>
  <text x="602" y="455" fill="#6b7280" font-size="10">NEXT_PUBLIC_* (4 variables Supabase + API)</text>

  <!-- Bottom summary bar -->
  <rect x="30" y="480" width="800" height="116" fill="white" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="430" y="503" text-anchor="middle" fill="#1e293b" font-size="14" font-weight="bold">Résumé — Temps estimé d'installation locale : 2h à 4h</text>

  <!-- Step indicators -->
  <circle cx="80" cy="535" r="14" fill="#3b82f6"/>
  <text x="80" y="540" text-anchor="middle" fill="white" font-size="12" font-weight="bold">1</text>
  <text x="100" y="532" fill="#374151" font-size="11" font-weight="bold">Python 3.10+</text>
  <text x="100" y="547" fill="#6b7280" font-size="10">+ pip install -r requirements.txt</text>

  <circle cx="250" cy="535" r="14" fill="#10b981"/>
  <text x="250" y="540" text-anchor="middle" fill="white" font-size="12" font-weight="bold">2</text>
  <text x="270" y="532" fill="#374151" font-size="11" font-weight="bold">Node.js 18+</text>
  <text x="270" y="547" fill="#6b7280" font-size="10">+ npm install (454 packages)</text>

  <circle cx="430" cy="535" r="14" fill="#ef4444"/>
  <text x="430" y="540" text-anchor="middle" fill="white" font-size="12" font-weight="bold">3</text>
  <text x="450" y="532" fill="#374151" font-size="11" font-weight="bold">Clés API</text>
  <text x="450" y="547" fill="#6b7280" font-size="10">Gemini + Supabase (à obtenir)</text>

  <circle cx="605" cy="535" r="14" fill="#8b5cf6"/>
  <text x="605" y="540" text-anchor="middle" fill="white" font-size="12" font-weight="bold">4</text>
  <text x="625" y="532" fill="#374151" font-size="11" font-weight="bold">3 fichiers .env</text>
  <text x="625" y="547" fill="#6b7280" font-size="10">Configuration manuelle requise</text>

  <circle cx="775" cy="535" r="14" fill="#f59e0b"/>
  <text x="775" y="540" text-anchor="middle" fill="white" font-size="12" font-weight="bold">5</text>
  <text x="430" y="572" text-anchor="middle" fill="#374151" font-size="11" font-weight="bold">Démarrer 4 terminaux en parallèle à chaque utilisation</text>
  <text x="795" y="540" fill="#374151" font-size="11" font-weight="bold">4 Terminaux</text>
  <text x="795" y="555" fill="#6b7280" font-size="10">à chaque session</text>

  <text x="430" y="587" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="bold">Sans déploiement : chaque utilisateur doit répéter l'intégralité de ces étapes sur sa propre machine</text>
</svg>
