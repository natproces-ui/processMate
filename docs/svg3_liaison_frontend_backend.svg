<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="620" fill="#fafafa" rx="12"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="900" height="68" fill="#18181b" rx="12"/>
  <rect x="0" y="51" width="900" height="17" fill="#18181b"/>
  <text x="450" y="27" text-anchor="middle" fill="white" font-size="19" font-weight="bold">PROCESSMATE — Liaison Frontend ↔ Backend</text>
  <text x="450" y="52" text-anchor="middle" fill="#a1a1aa" font-size="12">Gestion des chemins, variables d'environnement et build selon l'environnement</text>

  <!-- ===== TOP: DEV vs PROD labels ===== -->
  <rect x="30" y="82" width="390" height="28" fill="#dbeafe" rx="8" stroke="#2563eb" stroke-width="1.5"/>
  <text x="225" y="101" text-anchor="middle" fill="#1e40af" font-size="13" font-weight="bold">Environnement LOCAL (Développement)</text>
  <rect x="480" y="82" width="390" height="28" fill="#dcfce7" rx="8" stroke="#16a34a" stroke-width="1.5"/>
  <text x="675" y="101" text-anchor="middle" fill="#15803d" font-size="13" font-weight="bold">Environnement PRODUCTION (Déployé)</text>

  <!-- ===== FRONTEND ENV FILE ===== -->
  <!-- DEV .env.local -->
  <rect x="30" y="124" width="390" height="124" fill="white" rx="10" stroke="#93c5fd" stroke-width="1.5"/>
  <rect x="30" y="124" width="390" height="28" fill="#2563eb" rx="10"/>
  <rect x="30" y="140" width="390" height="12" fill="#2563eb"/>
  <text x="225" y="143" text-anchor="middle" fill="white" font-size="12" font-weight="bold">frontend/.env.local</text>
  <rect x="48" y="157" width="354" height="82" fill="#f8fafc" rx="6"/>
  <text x="62" y="175" fill="#1e3a5f" font-size="11" font-family="Consolas, monospace">NEXT_PUBLIC_API_URL=http://localhost:8002</text>
  <text x="62" y="193" fill="#1e3a5f" font-size="11" font-family="Consolas, monospace">NEXT_PUBLIC_SCV_API_URL=http://localhost:8001</text>
  <text x="62" y="211" fill="#1e3a5f" font-size="11" font-family="Consolas, monospace">NEXT_PUBLIC_SFD_API_URL=http://localhost:8004</text>
  <text x="62" y="229" fill="#1e3a5f" font-size="11" font-family="Consolas, monospace">NEXT_PUBLIC_SUPABASE_URL=https://owafxz...co</text>

  <!-- PROD .env.production -->
  <rect x="480" y="124" width="390" height="124" fill="white" rx="10" stroke="#86efac" stroke-width="1.5"/>
  <rect x="480" y="124" width="390" height="28" fill="#16a34a" rx="10"/>
  <rect x="480" y="140" width="390" height="12" fill="#16a34a"/>
  <text x="675" y="143" text-anchor="middle" fill="white" font-size="12" font-weight="bold">frontend/.env.production</text>
  <rect x="498" y="157" width="354" height="82" fill="#f8fafc" rx="6"/>
  <text x="512" y="175" fill="#14532d" font-size="11" font-family="Consolas, monospace">NEXT_PUBLIC_API_URL=https://processmate-back.onrender.com</text>
  <text x="512" y="193" fill="#14532d" font-size="11" font-family="Consolas, monospace">NEXT_PUBLIC_SCV_API_URL=https://scv-maker-api.onrender.com</text>
  <text x="512" y="211" fill="#14532d" font-size="11" font-family="Consolas, monospace">NEXT_PUBLIC_SFD_API_URL=https://sfd-generator-api.onrender.com</text>
  <text x="512" y="229" fill="#14532d" font-size="11" font-family="Consolas, monospace">NEXT_PUBLIC_SUPABASE_URL=https://owafxz...co</text>

  <!-- VS separator -->
  <rect x="424" y="150" width="52" height="52" fill="#f4f4f5" rx="26" stroke="#e4e4e7" stroke-width="1"/>
  <text x="450" y="178" text-anchor="middle" fill="#71717a" font-size="18" font-weight="bold">vs</text>

  <!-- ===== BUILD ===== -->
  <rect x="30" y="264" width="390" height="72" fill="white" rx="10" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="225" y="284" text-anchor="middle" fill="#2563eb" font-size="12" font-weight="bold">Commande de démarrage DEV</text>
  <text x="48" y="305" fill="#374151" font-size="12">npm run dev</text>
  <text x="160" y="305" fill="#9ca3af" font-size="11">→ pas de build, rechargement auto</text>
  <text x="48" y="325" fill="#6b7280" font-size="11">Accès : http://localhost:3000</text>

  <rect x="480" y="264" width="390" height="72" fill="white" rx="10" stroke="#86efac" stroke-width="1.5"/>
  <text x="675" y="284" text-anchor="middle" fill="#16a34a" font-size="12" font-weight="bold">Commande de build PROD</text>
  <text x="498" y="305" fill="#374151" font-size="12">npm run build</text>
  <text x="610" y="305" fill="#9ca3af" font-size="11">→ fichiers statiques .next/</text>
  <text x="498" y="325" fill="#374151" font-size="12">npm start</text>
  <text x="575" y="325" fill="#9ca3af" font-size="11">→ serveur optimisé port 3000</text>

  <!-- ===== CORS SECTION ===== -->
  <rect x="30" y="352" width="840" height="98" fill="white" rx="10" stroke="#fbbf24" stroke-width="2"/>
  <rect x="30" y="352" width="840" height="30" fill="#f59e0b" rx="10"/>
  <rect x="30" y="370" width="840" height="12" fill="#f59e0b"/>
  <text x="450" y="372" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Configuration CORS — A faire sur chaque backend</text>

  <!-- CORS boxes -->
  <rect x="48" y="388" width="244" height="52" fill="#fef3c7" rx="8"/>
  <text x="170" y="406" text-anchor="middle" fill="#92400e" font-size="11" font-weight="bold">clinic/.env (port 8002)</text>
  <text x="170" y="424" text-anchor="middle" fill="#78350f" font-size="10">FRONTEND_URL=https://votre-frontend.com</text>
  <text x="170" y="438" text-anchor="middle" fill="#78350f" font-size="10">IS_PRODUCTION=true</text>

  <rect x="328" y="388" width="244" height="52" fill="#fef3c7" rx="8"/>
  <text x="450" y="406" text-anchor="middle" fill="#92400e" font-size="11" font-weight="bold">backend/.env (port 8001)</text>
  <text x="450" y="424" text-anchor="middle" fill="#78350f" font-size="10">FRONTEND_URL=https://votre-frontend.com</text>
  <text x="450" y="438" text-anchor="middle" fill="#78350f" font-size="10">IS_PRODUCTION=true</text>

  <rect x="608" y="388" width="244" height="52" fill="#fef3c7" rx="8"/>
  <text x="730" y="406" text-anchor="middle" fill="#92400e" font-size="11" font-weight="bold">sfd/.env (port 8004)</text>
  <text x="730" y="424" text-anchor="middle" fill="#78350f" font-size="10">FRONTEND_URL=https://votre-frontend.com</text>
  <text x="730" y="438" text-anchor="middle" fill="#78350f" font-size="10">IS_PRODUCTION=true</text>

  <!-- ===== API CONFIG FILE ===== -->
  <rect x="30" y="464" width="840" height="88" fill="white" rx="10" stroke="#c084fc" stroke-width="1.5"/>
  <rect x="30" y="464" width="840" height="28" fill="#9333ea" rx="10"/>
  <rect x="30" y="480" width="840" height="12" fill="#9333ea"/>
  <text x="450" y="482" text-anchor="middle" fill="white" font-size="12" font-weight="bold">frontend/src/lib/api-config.ts — Point central de toutes les URLs API</text>
  <rect x="48" y="497" width="804" height="46" fill="#faf5ff" rx="6"/>
  <text x="62" y="515" fill="#581c87" font-size="11" font-family="Consolas, monospace">export const API_URL = process.env.NEXT_PUBLIC_API_URL || 'http://localhost:8002'</text>
  <text x="62" y="533" fill="#7e22ce" font-size="11" font-family="Consolas, monospace">  → Ce fichier doit être mis à jour si les URLs backend changent — liaison critique frontend/backend</text>

  <!-- ===== CHECKLIST ===== -->
  <rect x="30" y="564" width="840" height="44" fill="#f0fdf4" rx="8" stroke="#16a34a" stroke-width="1"/>
  <text x="450" y="582" text-anchor="middle" fill="#15803d" font-size="12" font-weight="bold">Checklist déploiement réussi</text>
  <text x="60" y="601" fill="#166534" font-size="11">✓ .env.production mis à jour</text>
  <text x="240" y="601" fill="#166534" font-size="11">✓ CORS configuré (3 backends)</text>
  <text x="440" y="601" fill="#166534" font-size="11">✓ npm run build sans erreur</text>
  <text x="630" y="601" fill="#166534" font-size="11">✓ API URLs testées après déploiement</text>
</svg>
